{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>{% block title %}{% endblock %}</title>        
        <link rel="stylesheet" href="{% static 'style.css' %}">
    </head>
    <body>  
        <header>
            <nav>
                <ul class="desktop-menu">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Illustrations</a></li>
                    <li><a href="#">Icons</a></li>                  
                </ul>
                <div class="navigation-buttons">                    
                    <a href="contact.html" class="contact-button">              
                        <img src="{% static 'envelope.svg' %}">
                        <p>Contact</p>                             
                    </a>  
                    <a href="cart.html" class="cart">
                        <img src="{% static 'trolley.svg' %}">
                        <p>Cart</p>
                        <span>0</span>
                    </a>
                    <div class="menu-buttons">
                        <button id="closed" onclick="openMobileMenu()">
                            <img src="{% static 'closed.svg' %}">        
                        </button>
                        <button id="opened" onclick="closeMobileMenu()">
                            <img src="{% static 'opened.svg' %}">                
                        </button>
                    </div>
                </div>   
            </nav>
            <ul id="mobileMenu" class="mobile-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>                     
                <li><a href="illustration_packages.html">Illustration packages</a></li>                  
                <li><a href="individual_illustrations.html">Individual illustrations</a></li>
                <li><a href="icon_sets.html">Icon sets</a></li>
                <li><a href="individual_icons.html">Individual icons</a></li>                                                                 
            </ul>             
        </header>
        <main>  
        {% block content %}
        {% endblock %}
        </main> 
        <footer>
            <a></a>
            <a></a>
        </footer>
        <script src="{% static 'script.js' %}"></script>   
    </body>
</html>
